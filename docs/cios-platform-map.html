
<title>CIOS · Platform Map</title>
<style>
:root {
  --bg:#F7F9FC; --s0:#FFF; --s1:#EEF2F8; --br:#DDE5F0;
  --t0:#0D1829; --t1:#455570; --t2:#8090A8;
  --discover:#1A56D6; --discover-bg:#EEF2FF; --discover-br:#BED0FF;
  --decide:#0B7A68;   --decide-bg:#EDFAF7;   --decide-br:#9FF0DF;
  --comply:#A05808;   --comply-bg:#FFF8EB;   --comply-br:#FADC80;
  --strengthen:#166834; --strengthen-bg:#EDFDF5; --strengthen-br:#A0F0C0;
  --compete:#5E21A8;  --compete-bg:#F5F0FF;  --compete-br:#D0B8FF;
  --flagship:#8A4508; --flagship-bg:#FFF7E8; --flagship-br:#D48808;
  --manage:#374151;   --manage-bg:#F8FAFB;   --manage-br:#D1D8E0;
  --learn:#1A3A60;    --learn-bg:#EEF5FF;    --learn-br:#90B8E0;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#060C1A; --s0:#0A1628; --s1:#0E1E35; --br:#162840;
  --t0:#D5E6F5; --t1:#7898B8; --t2:#486070;
  --discover:#60A0F5; --discover-bg:#080E20; --discover-br:#183060;
  --decide:#30D0B0;   --decide-bg:#061512;   --decide-br:#0C3525;
  --comply:#F8C840;   --comply-bg:#120E00;   --comply-br:#5A3808;
  --strengthen:#44D878; --strengthen-bg:#060E08; --strengthen-br:#124020;
  --compete:#A080F8;  --compete-bg:#0A0820;  --compete-br:#302060;
  --flagship:#F8C038; --flagship-bg:#130A00; --flagship-br:#886008;
  --manage:#90A0B5;   --manage-bg:#0A1020;   --manage-br:#1E2E48;
  --learn:#58A0F0;    --learn-bg:#060A18;    --learn-br:#142850;
}}
:root[data-theme=dark]{
  --bg:#060C1A; --s0:#0A1628; --s1:#0E1E35; --br:#162840;
  --t0:#D5E6F5; --t1:#7898B8; --t2:#486070;
  --discover:#60A0F5; --discover-bg:#080E20; --discover-br:#183060;
  --decide:#30D0B0;   --decide-bg:#061512;   --decide-br:#0C3525;
  --comply:#F8C840;   --comply-bg:#120E00;   --comply-br:#5A3808;
  --strengthen:#44D878; --strengthen-bg:#060E08; --strengthen-br:#124020;
  --compete:#A080F8;  --compete-bg:#0A0820;  --compete-br:#302060;
  --flagship:#F8C038; --flagship-bg:#130A00; --flagship-br:#886008;
  --manage:#90A0B5;   --manage-bg:#0A1020;   --manage-br:#1E2E48;
  --learn:#58A0F0;    --learn-bg:#060A18;    --learn-br:#142850;
}
:root[data-theme=light]{
  --bg:#F7F9FC; --s0:#FFF; --s1:#EEF2F8; --br:#DDE5F0;
  --t0:#0D1829; --t1:#455570; --t2:#8090A8;
  --discover:#1A56D6; --discover-bg:#EEF2FF; --discover-br:#BED0FF;
  --decide:#0B7A68;   --decide-bg:#EDFAF7;   --decide-br:#9FF0DF;
  --comply:#A05808;   --comply-bg:#FFF8EB;   --comply-br:#FADC80;
  --strengthen:#166834; --strengthen-bg:#EDFDF5; --strengthen-br:#A0F0C0;
  --compete:#5E21A8;  --compete-bg:#F5F0FF;  --compete-br:#D0B8FF;
  --flagship:#8A4508; --flagship-bg:#FFF7E8; --flagship-br:#D48808;
  --manage:#374151;   --manage-bg:#F8FAFB;   --manage-br:#D1D8E0;
  --learn:#1A3A60;    --learn-bg:#EEF5FF;    --learn-br:#90B8E0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--t0);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{max-width:1040px;margin:0 auto;padding:26px 18px 64px}

header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:1px solid var(--br);padding-bottom:18px;margin-bottom:18px}
.logo{font-family:Georgia,serif;font-size:21px;color:var(--t0);display:flex;align-items:baseline;gap:10px}
.logo span{font-size:12px;color:var(--t2);font-family:sans-serif;font-style:normal}
.tagline{font-size:12px;color:var(--flagship);font-style:italic}

.tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--s1);border:1px solid var(--br);border-radius:8px;padding:3px;width:fit-content;flex-wrap:wrap}
.tab{padding:5px 16px;border:none;border-radius:5px;background:transparent;color:var(--t1);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
.tab:hover{color:var(--t0)}
.tab.on{background:var(--s0);color:var(--t0);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.view{display:none}.view.on{display:block}

.bl{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--t2);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.bl::after{content:'';flex:1;height:1px;background:var(--br)}
.bl:first-child{margin-top:0}

.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
@media(max-width:640px){.mg{grid-template-columns:repeat(2,1fr)}}
.mc{background:var(--s0);border:1px solid var(--br);border-radius:8px;padding:12px 12px 10px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc,var(--br));transition:height .12s}
.mc:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.09);border-color:var(--acc,var(--br))}
.mc:hover::before{height:3px}
.mnum{font-size:9.5px;font-family:'Courier New',monospace;color:var(--t2);margin-bottom:4px}
.mname{font-size:12.5px;font-weight:600;color:var(--t0);margin-bottom:4px;line-height:1.3}
.mdesc{font-size:11px;color:var(--t1);line-height:1.4}
.mbadge{display:inline-block;margin-top:8px;padding:2px 8px;border-radius:100px;font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}

.flagship{grid-column:1/-1;background:var(--flagship-bg);border:1.5px solid var(--flagship-br);border-radius:10px;padding:18px 20px;cursor:pointer;transition:box-shadow .15s,transform .12s;display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:20px;align-items:start}
.flagship:hover{box-shadow:0 0 0 2px var(--flagship-br),0 8px 24px rgba(0,0,0,.1);transform:translateY(-1px)}
@media(max-width:560px){.flagship{grid-template-columns:1fr}}
.fs-eye{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--flagship);margin-bottom:6px}
.fs-name{font-family:Georgia,serif;font-size:19px;color:var(--t0);margin-bottom:6px;line-height:1.2}
.fs-desc{font-size:12px;color:var(--t1);line-height:1.55}
.fs-sl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t2);margin-bottom:6px}
.dod{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.dod-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dod-n{font-size:11.5px;font-weight:600;color:var(--t0)}
.dod-s{font-size:10px;color:var(--t2);margin-left:auto}
.fs-outs{display:flex;flex-direction:column;gap:5px}
.fs-o{font-size:11.5px;color:var(--t1);display:flex;gap:6px;align-items:flex-start}
.fs-o::before{content:'→';color:var(--flagship);flex-shrink:0}

/* data foundation — tiered by jurisdiction */
.ftier{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.ftier-row{display:grid;gap:6px;align-items:stretch}
.ftier-row.federal{grid-template-columns:1fr 1fr 1fr 1fr}
.ftier-row.state{grid-template-columns:1fr 1fr 1fr 1fr}
.ftier-row.intl{grid-template-columns:1fr 1fr 1fr}
@media(max-width:640px){.ftier-row.federal,.ftier-row.state,.ftier-row.intl{grid-template-columns:1fr 1fr}}
.ftier-label{display:flex;align-items:center;gap:8px;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.ftier-line{flex:1;height:1px;background:var(--br)}
.fc{background:var(--s0);border:1px solid var(--br);border-radius:8px;padding:10px 12px}
.fc.vault{background:var(--learn-bg);border-color:var(--learn-br);cursor:pointer}
.ft{font-size:12px;font-weight:700;color:var(--t0);margin-bottom:3px}
.fd{font-size:11px;color:var(--t1);line-height:1.4}
.ftag{display:inline-block;margin-top:6px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);border:1px solid var(--br);border-radius:4px;padding:2px 6px}
.ftag.live{color:var(--decide);border-color:var(--decide-br);background:var(--decide-bg)}
.ftag.p2{color:var(--comply);border-color:var(--comply-br);background:var(--comply-bg)}
.ftag.p3{color:var(--compete);border-color:var(--compete-br);background:var(--compete-bg)}

/* agents */
.awt{background:var(--s0);border:1px solid var(--br);border-radius:10px;padding:22px;overflow-x:auto}
.ceo-row{display:flex;justify-content:center;margin-bottom:4px}
.ceo-node{display:flex;flex-direction:column;align-items:center;gap:4px}
.ceo-pill{padding:10px 30px;border-radius:100px;border:1.5px solid var(--flagship-br);background:var(--flagship-bg);color:var(--flagship);font-size:14px;font-weight:700}
.nm{font-size:9.5px;font-family:'Courier New',monospace;color:var(--t2)}
.nr{font-size:11px;color:var(--t2);text-align:center;max-width:160px;line-height:1.3}
.tree-line{display:flex;justify-content:center;margin:2px 0}
.dir-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:640px){.dir-grid{grid-template-columns:repeat(2,1fr)}}
.dc{background:var(--s1);border:1px solid var(--br);border-radius:8px;padding:12px}
.dn{font-size:12px;font-weight:600;color:var(--t0);margin-bottom:2px}
.dm{font-size:9.5px;font-family:'Courier New',monospace;color:var(--t2);margin-bottom:8px}
.alist{border-top:1px solid var(--br);padding-top:7px;display:flex;flex-direction:column;gap:3px}
.ai{font-size:11px;color:var(--t1);display:flex;align-items:center;gap:5px}
.ai::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--t2);flex-shrink:0}
.ai .hk{margin-left:auto;font-size:9px;font-family:monospace;color:var(--t2);background:var(--s0);border:1px solid var(--br);border-radius:3px;padding:1px 4px}
.pcards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
@media(max-width:560px){.pcards{grid-template-columns:1fr}}
.pc{background:var(--s1);border:1px solid var(--br);border-radius:8px;padding:12px 14px}
.pct{font-size:12px;font-weight:700;color:var(--t0);margin-bottom:4px}
.pcd{font-size:11.5px;color:var(--t1);line-height:1.5}

.sim-strip{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:8px;margin-top:12px}
@media(max-width:560px){.sim-strip{grid-template-columns:1fr}}

/* journey */
.jstep{display:grid;grid-template-columns:200px 1fr;gap:14px;position:relative;min-height:72px}
.jstep+.jstep{margin-top:2px}
.jleft{display:flex;align-items:flex-start;gap:12px;padding:16px 0;position:relative}
.jleft::after{content:'';position:absolute;left:19px;top:56px;bottom:-2px;width:1px;background:var(--br);z-index:0}
.jstep:last-child .jleft::after{display:none}
.jnum{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;position:relative;z-index:1;border:2px solid}
.jmeta{padding-top:4px}
.jph{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px}
.jq{font-size:13px;font-weight:600;color:var(--t0);line-height:1.35}
.jright{padding:16px 0;display:flex;flex-direction:column;gap:8px}
.jchips{display:flex;flex-wrap:wrap;gap:5px}
.jchip{padding:4px 10px;border-radius:6px;border:1px solid;font-size:11.5px;font-weight:500;cursor:pointer;transition:opacity .12s}
.jchip:hover{opacity:.7}
.jout{font-size:12.5px;color:var(--t1);line-height:1.5}
.jout b{color:var(--flagship);font-weight:600}
@media(max-width:540px){.jstep{grid-template-columns:1fr}.jleft::after{display:none}}

/* jurisdiction tab */
.jur-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:20px}
@media(max-width:640px){.jur-bar{grid-template-columns:repeat(2,1fr)}}
.jur-card{border-radius:10px;padding:16px 14px;border:1.5px solid;display:flex;flex-direction:column;gap:6px}
.jur-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em}
.jur-name{font-family:Georgia,serif;font-size:15px;line-height:1.25}
.jur-desc{font-size:11px;line-height:1.45;opacity:.8}
.jur-pack{font-size:9.5px;font-family:'Courier New',monospace;margin-top:2px;opacity:.7}
.jur-status{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-radius:4px;padding:2px 7px;border:1px solid;width:fit-content}

.rule-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
@media(max-width:600px){.rule-grid{grid-template-columns:1fr 1fr}}
.rp{background:var(--s0);border:1px solid var(--br);border-radius:8px;padding:12px 14px}
.rp-id{font-size:9.5px;font-family:'Courier New',monospace;color:var(--t2);margin-bottom:4px}
.rp-name{font-size:12.5px;font-weight:600;color:var(--t0);margin-bottom:4px}
.rp-desc{font-size:11px;color:var(--t1);line-height:1.4}

.compliance-matrix{background:var(--s0);border:1px solid var(--br);border-radius:10px;overflow:hidden;overflow-x:auto}
.cm-header{display:grid;grid-template-columns:160px repeat(5,1fr);background:var(--s1);border-bottom:1px solid var(--br);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.cm-row{display:grid;grid-template-columns:160px repeat(5,1fr);border-bottom:1px solid var(--br)}
.cm-row:last-child{border-bottom:none}
.cm-cell{padding:9px 10px;font-size:11.5px;color:var(--t1);border-right:1px solid var(--br);display:flex;align-items:center}
.cm-cell:last-child{border-right:none}
.cm-cell.label{font-weight:600;color:var(--t0);font-size:12px}
.cm-cell.hdr{color:var(--t2);padding:8px 10px}
.chk{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.chk.yes{background:var(--decide-bg);color:var(--decide);border:1px solid var(--decide-br)}
.chk.roadmap{background:var(--comply-bg);color:var(--comply);border:1px solid var(--comply-br)}
.chk.no{background:var(--s1);color:var(--t2);border:1px solid var(--br)}

/* panel */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40}
.overlay.on{display:block}
.panel{position:fixed;right:0;top:0;bottom:0;width:min(360px,90vw);background:var(--s0);border-left:1px solid var(--br);z-index:50;padding:20px;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.panel.on{transform:translateX(0)}
.p-close{display:flex;justify-content:flex-end;margin-bottom:14px}
.p-close button{background:var(--s1);border:1px solid var(--br);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--t1);cursor:pointer}
.p-close button:hover{color:var(--t0)}
.p-num{font-size:9.5px;font-family:'Courier New',monospace;color:var(--t2);margin-bottom:5px}
.p-name{font-family:Georgia,serif;font-size:20px;color:var(--t0);margin-bottom:6px;line-height:1.2}
.p-cat{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;border:1px solid}
.p-div{height:1px;background:var(--br);margin:14px 0}
.p-sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t2);margin-bottom:7px}
.p-desc{font-size:13.5px;color:var(--t1);line-height:1.65;margin-bottom:14px}
.p-outs{display:flex;flex-direction:column;gap:5px}
.p-out{font-size:13px;color:var(--t1);display:flex;gap:7px;align-items:flex-start;line-height:1.4}
.p-arr{flex-shrink:0;font-weight:600}
.p-conns{display:flex;flex-wrap:wrap;gap:5px}
.p-conn{padding:3px 10px;background:var(--s1);border:1px solid var(--br);border-radius:5px;font-size:11px;color:var(--t1);cursor:pointer}
.p-conn:hover{color:var(--t0)}
</style>

<div class="app">
<header>
  <div class="logo">CIOS <span>Contract Intelligence Operating System</span></div>
  <div class="tagline">Jurisdiction-agnostic · Federal · State · Local · Tribal · International</div>
</header>

<div class="tabs">
  <button class="tab on" data-t="platform">Platform Map</button>
  <button class="tab" data-t="agents">AI Engine</button>
  <button class="tab" data-t="journey">The Journey</button>
  <button class="tab" data-t="jurisdiction">Jurisdiction Scope</button>
</div>

<div class="view on" id="v-platform"></div>
<div class="view" id="v-agents"></div>
<div class="view" id="v-journey"></div>
<div class="view" id="v-jurisdiction"></div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="p-close"><button onclick="closePanel()">✕ Close</button></div>
  <div id="pb"></div>
</div>

<script>
const CAT={
  discover:  {label:'Discover',  fg:'var(--discover)',  bg:'var(--discover-bg)',  br:'var(--discover-br)'},
  decide:    {label:'Decide',    fg:'var(--decide)',    bg:'var(--decide-bg)',    br:'var(--decide-br)'},
  comply:    {label:'Comply',    fg:'var(--comply)',    bg:'var(--comply-bg)',    br:'var(--comply-br)'},
  strengthen:{label:'Strengthen',fg:'var(--strengthen)',bg:'var(--strengthen-bg)',br:'var(--strengthen-br)'},
  compete:   {label:'Compete',   fg:'var(--compete)',   bg:'var(--compete-bg)',   br:'var(--compete-br)'},
  flagship:  {label:'Flagship',  fg:'var(--flagship)', bg:'var(--flagship-bg)', br:'var(--flagship-br)'},
  manage:    {label:'Manage',    fg:'var(--manage)',    bg:'var(--manage-bg)',    br:'var(--manage-br)'},
  learn:     {label:'Learn',     fg:'var(--learn)',     bg:'var(--learn-bg)',     br:'var(--learn-br)'},
};

const M={
  '01':{name:'Opportunity Intelligence',cat:'discover',
    short:'Multi-jurisdiction discovery — federal, state, local, and international portals.',
    desc:'Automated discovery and intelligence extraction across all jurisdiction types. Sources include SAM.gov (federal), state procurement portals, DemandStar and BidNet (state/local), EU TED (European), and World Bank STEP. Manual entry and custom RSS feeds support any portal not natively integrated. AI extracts requirements, evaluation criteria, incumbent signals, and competitive intelligence from raw solicitation documents regardless of jurisdiction.',
    outputs:['Enriched opportunity records with extracted requirements','Evaluation criteria and factor weights identified','Incumbent contractor signals surfaced','Competitive intensity score per opportunity','jurisdiction_type field set on every record'],
    connects:['02','05','08','12']},
  '02':{name:'Bid / No-Bid Engine',cat:'decide',
    short:'Evidence-based go/no-go across 8 weighted dimensions.',
    desc:'Go/no-go decision support scored across eight dimensions: Strategic Fit (20%), Win Probability (20%), Past Performance Alignment (15%), Capability Match (15%), Competitive Position (10%), Cost of Bid ROI (10%), Risk Profile (5%), Relationship Strength (5%). Scoring logic is jurisdiction-aware — set-aside eligibility criteria vary by jurisdiction_type. Always includes full rationale and an alternative recommendation.',
    outputs:['Weighted composite score with rationale','Go / No-Go recommendation','Per-dimension breakdown with evidence','Alternative recommendation always included'],
    connects:['01','04','05','06','12']},
  '03':{name:'Procurement Rule Engine',cat:'comply',
    short:'Pluggable rule packs: FAR · DFARS · State/Local · EU · World Bank · Custom.',
    desc:'Jurisdiction-agnostic rule enforcement layer. Every analysis cites the specific regulation that applies. The active rule pack is resolved from the opportunity\'s jurisdiction_type at runtime — no hardcoded federal assumptions. Enterprise customers can define custom rule packs for agency-specific supplements or non-standard jurisdictions.',
    outputs:['Rule pack auto-resolved from jurisdiction_type','us_federal_far — FAR Parts 1–53','us_federal_dfars — DFARS + agency supplements','state_generic — Uniform Procurement Act','eu_public_procurement — EU Directive 2014/24/EU','world_bank — IPF Borrower Procurement Regulations','Custom rule packs available for Enterprise'],
    connects:['04','13']},
  '04':{name:'Compliance Engine',cat:'comply',
    short:'Mandatory compliance verification — jurisdiction-specific gates before bid commitment.',
    desc:'Verifies all mandatory compliance gates before bid resource commitment. What those gates are depends on the jurisdiction_type. Federal: SAM.gov registration, NAICS eligibility, set-aside qualifications, CMMC level, security clearances. State/local: business license, prevailing wage (state Davis-Bacon equivalents), local preference ordinances, DBE/MBE/WBE certifications. International: country-specific registration, local content requirements, multi-lateral development bank eligibility.',

          const v=row[k];
          if(v===1) return `<div class="cm-cell"><div class="chk yes">✓</div></div>`;
          if(v==='r') return `<div class="cm-cell"><div class="chk roadmap">~</div></div>`;
          return `<div class="cm-cell"><div class="chk no">–</div></div>`;
        }).join('')}
      </div>
    `).join('')}
  </div>
  <div style="display:flex;gap:14px;margin-top:8px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t1)"><div class="chk yes" style="width:16px;height:16px">✓</div> Live</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t1)"><div class="chk roadmap" style="width:16px;height:16px">~</div> Roadmap (Phase 3)</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t1)"><div class="chk no" style="width:16px;height:16px">–</div> Not applicable</div>
  </div>
`;

/* ── Panel ── */
function openPanel(id){
  const m=M[id],c=CAT[m.cat];
  document.getElementById('pb').innerHTML=`
    <div class="p-num">MODULE ${id}</div>
    <div class="p-name">${m.name}</div>
    <div class="p-cat" style="background:${c.bg};color:${c.fg};border-color:${c.br}">${c.label}</div>
    <div class="p-sl">Description</div>
    <div class="p-desc">${m.desc}</div>
    <div class="p-div"></div>
    <div class="p-sl">Key Outputs</div>
    <div class="p-outs">${m.outputs.map(o=>`<div class="p-out"><span class="p-arr" style="color:${c.fg}">→</span>${o}</div>`).join('')}</div>
    ${m.connects.length?`<div class="p-div"></div><div class="p-sl">Connects To</div><div class="p-conns">${m.connects.map(cid=>`<div class="p-conn" onclick="openPanel('${cid}')">M${cid} · ${M[cid].name}</div>`).join('')}</div>`:''}
  `;
  document.getElementById('panel').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}
function closePanel(){
  document.getElementById('panel').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    document.getElementById('v-'+t.dataset.t).classList.add('on');
  });
});
</script>
