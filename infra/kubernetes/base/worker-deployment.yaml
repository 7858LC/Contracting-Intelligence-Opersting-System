apiVersion: apps/v1
kind: Deployment
metadata:
  name: cios-worker
  namespace: cios
  labels:
    app: cios-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cios-worker
  template:
    metadata:
      labels:
        app: cios-worker
    spec:
      serviceAccountName: cios-api
      containers:
        - name: worker
          image: ghcr.io/your-org/cios-api:latest
          command:
            - celery
            - -A
            - cios.tasks
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - default,simulations,ingestion,analysis,email
          envFrom:
            - secretRef:
                name: cios-secrets
            - configMapRef:
                name: cios-config
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A cios.tasks inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cios-worker-simulations
  namespace: cios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cios-worker-simulations
  template:
    metadata:
      labels:
        app: cios-worker-simulations
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/cios-api:latest
          command:
            - celery
            - -A
            - cios.tasks
            - worker
            - --loglevel=info
            - --concurrency=2
            - -Q
            - simulations
          envFrom:
            - secretRef:
                name: cios-secrets
            - configMapRef:
                name: cios-config
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
